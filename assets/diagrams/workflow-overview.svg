<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="420" viewBox="0 0 1280 420" role="img" aria-labelledby="title desc">
  <title id="title">Fantasia workflow overview</title>
  <desc id="desc">Public-safe workflow diagram showing owner intent, local session, review surface, receipt, guarded boundary, rollback ready, and public-safe output.</desc>
  <rect width="1280" height="420" fill="#171414"/>
  <text x="54" y="70" fill="#fffdf8" font-family="Inter, Segoe UI, sans-serif" font-size="34" font-weight="800">Fantasia Workflow Overview</text>
  <text x="54" y="104" fill="#eadfd5" font-family="Inter, Segoe UI, sans-serif" font-size="17">Public-safe diagram. No endpoints, source architecture, credentials, or private runbooks.</text>
  <g font-family="Inter, Segoe UI, sans-serif" font-weight="800">
    <g transform="translate(54 184)"><rect width="142" height="78" rx="10" fill="#fffdf8"/><text x="71" y="46" text-anchor="middle" fill="#171414" font-size="17">Owner Intent</text></g>
    <g transform="translate(224 184)"><rect width="142" height="78" rx="10" fill="#fffdf8"/><text x="71" y="46" text-anchor="middle" fill="#171414" font-size="17">Local Session</text></g>
    <g transform="translate(394 184)"><rect width="150" height="78" rx="10" fill="#fffdf8"/><text x="75" y="46" text-anchor="middle" fill="#171414" font-size="17">Review Surface</text></g>
    <g transform="translate(572 184)"><rect width="126" height="78" rx="10" fill="#fffdf8"/><text x="63" y="46" text-anchor="middle" fill="#171414" font-size="17">Receipt</text></g>
    <g transform="translate(726 184)"><rect width="164" height="78" rx="10" fill="#fffdf8"/><text x="82" y="46" text-anchor="middle" fill="#171414" font-size="17">Guarded Boundary</text></g>
    <g transform="translate(918 184)"><rect width="148" height="78" rx="10" fill="#fffdf8"/><text x="74" y="46" text-anchor="middle" fill="#171414" font-size="17">Rollback Ready</text></g>
    <g transform="translate(1094 184)"><rect width="142" height="78" rx="10" fill="#2f7a5f"/><text x="71" y="38" text-anchor="middle" fill="#fffdf8" font-size="16">Public-Safe</text><text x="71" y="58" text-anchor="middle" fill="#fffdf8" font-size="16">Output</text></g>
  </g>
  <g stroke="#b68b4a" stroke-width="3" stroke-linecap="round"><path d="M196 223h28"/><path d="M366 223h28"/><path d="M544 223h28"/><path d="M698 223h28"/><path d="M890 223h28"/><path d="M1066 223h28"/></g>
  <text x="54" y="344" fill="#eadfd5" font-family="Inter, Segoe UI, sans-serif" font-size="18">The public promise: visible local work, review, receipts, guarded boundaries, rollback readiness, and protected output.</text>
</svg>
