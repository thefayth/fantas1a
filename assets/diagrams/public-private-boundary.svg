
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Fantasia public private boundary</title>
  <desc id="desc">Boundary between public GitHub materials and the private local Fantasia engine.</desc>
  <rect width="1400" height="760" fill="#ffffff"/>
  <text x="70" y="82" fill="#351066" font-family="Arial, sans-serif" font-size="44" font-weight="700">Public / Private Boundary</text>
  <rect x="70" y="150" width="560" height="470" rx="24" fill="#F7FEE7" stroke="#84CC16" stroke-width="4"/>
  <rect x="770" y="150" width="560" height="470" rx="24" fill="#F5F3FF" stroke="#5B21B6" stroke-width="4"/>
  <text x="110" y="210" fill="#365314" font-family="Arial, sans-serif" font-size="30" font-weight="700">Public Surface</text>
  <text x="810" y="210" fill="#351066" font-family="Arial, sans-serif" font-size="30" font-weight="700">Private Engine</text>
  <g font-family="Arial, sans-serif" font-size="23" fill="#1F2937">
    <text x="110" y="275">README and project brief</text>
    <text x="110" y="325">Hero, banner, social card, diagrams</text>
    <text x="110" y="375">Status, roadmap, FAQ, policies</text>
    <text x="110" y="425">WordPress page draft</text>
    <text x="110" y="475">All Rights Reserved notice</text>
    <text x="810" y="275">Desktop source and worker code</text>
    <text x="810" y="325">Queues, telemetry, leases, receipts</text>
    <text x="810" y="375">Credentials and private systems</text>
    <text x="810" y="425">Raw coursework and private archives</text>
    <text x="810" y="475">Customer, family, medical, legal data</text>
  </g>
  <path d="M660 380 C700 340, 730 340, 770 380" stroke="#5B21B6" stroke-width="6" fill="none" stroke-linecap="round"/>
  <text x="615" y="690" fill="#4B5563" font-family="Arial, sans-serif" font-size="24">Only public-safe summaries and selected visuals cross this boundary. Secrets never cross.</text>
</svg>
